<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Contact form for a simple HTML-only website for roadmap.sh frontend">
    <meta name="keywords" content="HTML, Frontend, Roadmap.sh">
    <meta name="author" content="Abdulrahman Hanfy">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rosarivo:ital@0;1&display=swap" rel="stylesheet">
    <title>Contact | Personal Portfolio</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <span class="logo">
            <img src="../assets/images/logo.png" alt="logo">
        </span>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="article.html">Article</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <button class="toggle-theme" onclick="toggleTheme()">
            <svg id="sun_icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>

            <svg id='moon_icon' style="display: none;" xmlns=" http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="feather feather-sun">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>

        </button>
    </header>


    <main>
        <section class="contact">
            <h1 class="page-Name">Contact Me</h1>

            <form action="" method="post">
                <label for="Name">Name: </label>
                <input type="text" name="client-Name" id="Name" required>

                <label for="Email">Email: </label>
                <input type="email" name="client-Email" id="Email" required>

                <label for="message">Message: </label>
                <textarea name="client-Message" id="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>&copy; all rights reserved 2026</footer>


    <script src="script.js"></script>
</body>

</html>
